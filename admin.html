<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大会QRコード作成（運営用）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{--track:#9E3B2F;--ink:#1F2A37;--line:#D8D2C6;--field:#F5F2EC}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif;background:var(--field);color:var(--ink);line-height:1.6}
  .wrap{max-width:560px;margin:0 auto;padding:16px 16px 48px}
  header{border-bottom:4px double var(--track);padding:20px 0 12px;margin-bottom:20px}
  header .org{font-size:12px;letter-spacing:.2em;color:var(--track);font-weight:700}
  header h1{font-size:20px;font-weight:800}
  .card{background:#fff;border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
  .label{font-size:12px;font-weight:700;color:#6B7280;letter-spacing:.1em}
  input{width:100%;font-size:17px;padding:12px;border:2px solid var(--line);border-radius:8px;margin:6px 0 14px}
  input:focus{outline:3px solid var(--track);border-color:var(--track)}
  button{width:100%;font-size:18px;font-weight:800;color:#fff;background:var(--track);border:none;border-radius:10px;padding:16px;cursor:pointer;letter-spacing:.1em}
  .qr-sheet{text-align:center;padding:28px 20px}
  .qr-sheet h2{font-size:22px;font-weight:800}
  .qr-sheet .date{font-size:16px;margin-bottom:16px}
  #qrcode{display:flex;justify-content:center;margin:0 auto 16px}
  .url{font-size:11px;word-break:break-all;color:#6B7280}
  .hint{font-size:13px;color:#6B7280;margin-top:8px}
  @media print{
    body{background:#fff}
    .no-print{display:none}
    .qr-sheet{padding-top:80px}
    .qr-sheet h2{font-size:32px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="no-print">
    <div class="org">陸上競技 役員受付</div>
    <h1>大会QRコード作成（運営用）</h1>
  </header>

  <div class="card no-print">
    <label class="label" for="mname">大会名</label>
    <input type="text" id="mname" placeholder="例：第1回滋賀県記録会">
    <label class="label" for="mdate">開催日</label>
    <input type="date" id="mdate">
    <label class="label" for="mid">大会ID（半角英数。例：20260620-kirokukai）</label>
    <input type="text" id="mid" placeholder="20260620-kirokukai">
    <button onclick="makeQR()">QRコードを作成</button>
    <p class="hint">作成後、ブラウザの印刷機能でA4に印刷して受付に掲示してください。</p>
  </div>

  <div class="card qr-sheet" id="sheet" hidden>
    <div class="label">役員受付　スマホで読み取ってください</div>
    <h2 id="outName"></h2>
    <div class="date" id="outDate"></div>
    <div id="qrcode"></div>
    <div class="url" id="outUrl"></div>
  </div>
</div>

<script>
/* ===== 設定 ===== */
const PAGE_URL = "https://あなたのユーザー名.github.io/yakuin-uketsuke/index.html"; // 公開後のURLに変更
const KEY = "3925"; // gas/Code.gs の KEY と同じ文字列にする
/* ================ */

function makeQR(){
  const name = document.getElementById("mname").value.trim();
  const date = document.getElementById("mdate").value;
  const id   = document.getElementById("mid").value.trim();
  if(!name || !date || !id){ alert("すべての項目を入力してください。"); return; }

  const url = PAGE_URL
    + "?e=" + encodeURIComponent(id)
    + "&n=" + encodeURIComponent(name)
    + "&d=" + encodeURIComponent(date)
    + "&k=" + encodeURIComponent(KEY);

  document.getElementById("outName").textContent = name;
  const m = date.split("-");
  document.getElementById("outDate").textContent = `${m[0]}年${Number(m[1])}月${Number(m[2])}日`;
  document.getElementById("outUrl").textContent = url;

  const box = document.getElementById("qrcode");
  box.innerHTML = "";
  new QRCode(box, {text: url, width: 280, height: 280, correctLevel: QRCode.CorrectLevel.M});

  document.getElementById("sheet").hidden = false;
}
</script>
</body>
</html>
